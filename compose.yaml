name: esse-beauty

services:
  db:
    image: postgres:16-alpine
    container_name: esse-beauty-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-esse_beauty}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-esse_beauty}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      app:
        aliases:
          - db

  redis:
    image: redis:7-alpine
    container_name: esse-beauty-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - app

  migrate:
    container_name: esse-beauty-migrate
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-esse_beauty}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - app

  api:
    container_name: esse-beauty-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 3001
      API_HOST: 0.0.0.0
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-http://localhost:3000,http://localhost:3002}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-esse_beauty}
      REDIS_URL: redis://redis:6379
      SUPABASE_URL: ${SUPABASE_URL:-https://example.supabase.co}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-local-service-role-key}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-local-development-jwt-secret-change-me}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-notifications@example.com}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      PWA_URL: ${PWA_URL:-http://localhost:3002}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - app

  web:
    container_name: esse-beauty-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://example.supabase.co}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-local-anon-key}
    restart: unless-stopped
    init: true
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app

  pwa:
    container_name: esse-beauty-pwa
    build:
      context: .
      dockerfile: apps/pwa/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://example.supabase.co}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-local-anon-key}
    restart: unless-stopped
    init: true
    ports:
      - "${PWA_PORT:-3002}:3002"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app

networks:
  app:
    name: esse-beauty-network

volumes:
  postgres_data:
    name: esse-beauty-postgres-data
  redis_data:
    name: esse-beauty-redis-data
